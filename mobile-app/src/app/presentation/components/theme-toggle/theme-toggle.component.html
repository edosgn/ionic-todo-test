<ion-button 
  fill="clear" 
  size="default"
  class="theme-toggle-btn"
  (click)="toggleTheme()"
  [attr.aria-label]="'Toggle theme to ' + (isDarkMode() ? 'light' : 'dark') + ' mode'">
  <ion-icon 
    slot="icon-only" 
    size="large"
    [name]="isDarkMode() ? 'sunny' : 'moon'">
  </ion-icon>
</ion-button>
